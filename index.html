<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Bomba</title>

<link rel="manifest" href="manifest.json">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at 20% 20%, #1e2a4a, #0b1220 70%);
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.card {
  width: 350px;
  padding: 30px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}

h1 {
  margin-top: 0;
  font-size: 22px;
  font-weight: 500;
  opacity: 0.8;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 18px 0;
  font-size: 16px;
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
}

.led {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: red;
  box-shadow: 0 0 8px red;
  transition: 0.3s;
}

.green {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
}

.red {
  background: #ff3b3b;
  box-shadow: 0 0 10px #ff3b3b;
}

.buttons {
  margin-top: 25px;
  display: flex;
  justify-content: space-between;
}

button {
  flex: 1;
  margin: 5px;
  padding: 12px;
  border-radius: 12px;
  border: none;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

.on {
  background: #00c853;
  color: white;
}

.off {
  background: #d50000;
  color: white;
}

button:hover {
  transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card">
  <h1>Panel de Control</h1>

  <div class="row">
    <div>Conectado a MQTT</div>
    <div class="status">
      <div id="mqttLed" class="led red"></div>
    </div>
  </div>

  <div class="row">
    <div>Control bomba: <span id="bombaEstado">OFF</span></div>
    <div class="status">
      <div id="bombaLed" class="led red"></div>
    </div>
  </div>

  <div class="buttons">
    <button class="on" onclick="encender()">Encender</button>
    <button class="off" onclick="apagar()">Apagar</button>
  </div>

</div>

<script>
const options = {
  username: "esp32",
  password: "Loquesea123",
  reconnectPeriod: 2000
};

const client = mqtt.connect("wss://4681e769df664e0daab26f3bdd7b3a70.s1.eu.hivemq.cloud:8884/mqtt", options);

const mqttLed = document.getElementById("mqttLed");
const bombaLed = document.getElementById("bombaLed");
const bombaEstado = document.getElementById("bombaEstado");

client.on("connect", function () {
  mqttLed.classList.remove("red");
  mqttLed.classList.add("green");
  client.subscribe("bomba/estado");
});

client.on("reconnect", function () {
  mqttLed.classList.remove("green");
  mqttLed.classList.add("red");
});

client.on("close", function () {
  mqttLed.classList.remove("green");
  mqttLed.classList.add("red");
});

client.on("message", function (topic, message) {
  const estado = message.toString().trim().toUpperCase();

  if (estado === "ON") {
    bombaLed.classList.remove("red");
    bombaLed.classList.add("green");
    bombaEstado.innerText = "ON";
  } else {
    bombaLed.classList.remove("green");
    bombaLed.classList.add("red");
    bombaEstado.innerText = "OFF";
  }
});

function encender() {
  client.publish("bomba/control", "ON");
}

function apagar() {
  client.publish("bomba/control", "OFF");
}
</script>

</body>
</html>
