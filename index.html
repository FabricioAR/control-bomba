<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Bomba</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#1e1e1e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#121212;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
}

.container{
  margin-top:40px;
}

button{
  width:200px;
  padding:15px;
  font-size:18px;
  margin:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.on{
  background:#00c853;
  color:white;
}

.off{
  background:#d50000;
  color:white;
}

button:active{
  transform:scale(0.95);
}

.status{
  margin-top:30px;
  font-size:20px;
}

.indicator{
  margin:20px auto;
  width:20px;
  height:20px;
  border-radius:50%;
  background:red;
  transition:0.3s;
}

.connected{
  background:#00c853;
}

</style>
</head>

<body>

<h1>Control de Bomba</h1>

<div class="indicator" id="led"></div>

<div class="container">
  <button class="on" onclick="encender()">Encender</button>
  <button class="off" onclick="apagar()">Apagar</button>
</div>

<div class="status" id="estado">Desconectado</div>

<script>

// 🔐 CONFIGURA AQUI
const options = {
  username: "esp32",
  password: "Loquesea123",
  reconnectPeriod: 2000
};

// IMPORTANTE: reemplaza TU_HOST por tu servidor HiveMQ
const client = mqtt.connect("wss://4681e769df664e0daab26f3bdd7b3a70.s1.eu.hivemq.cloud:8884/mqtt", options);

const estadoTexto = document.getElementById("estado");
const led = document.getElementById("led");

client.on("connect", function () {

  estadoTexto.innerHTML = "Conectado a MQTT";
  led.classList.add("connected");

  client.subscribe("bomba/estado");

});

client.on("reconnect", function () {
  estadoTexto.innerHTML = "Reconectando...";
  led.classList.remove("connected");
});

client.on("error", function () {
  estadoTexto.innerHTML = "Error de conexión";
  led.classList.remove("connected");
});

client.on("message", function(topic, message){

  if(topic === "bomba/estado"){
    const estado = message.toString();

    estadoTexto.innerHTML = "Bomba: " + estado;

    if(estado === "ON"){
      led.style.background = "#00c853";
    } else {
      led.style.background = "#d50000";
    }
  }

});

function encender(){
  client.publish("bomba/control","ON");
}

function apagar(){
  client.publish("bomba/control","OFF");
}

</script>

</body>
</html>
