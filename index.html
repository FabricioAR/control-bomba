<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Control de Bomba</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#121212">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#121212;
  color:white;
  text-align:center;
}

h1{
  margin-top:40px;
}

.status-row{
  width:85%;
  margin:15px auto;
  padding:14px;
  background:#1e1e1e;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:18px;
}

.led{
  width:18px;
  height:18px;
  border-radius:50%;
  background:red;
  transition:0.3s;
}

.container{
  margin-top:40px;
}

button{
  width:200px;
  padding:15px;
  font-size:18px;
  margin:15px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.on{
  background:#00c853;
  color:white;
}

.off{
  background:#d50000;
  color:white;
}

button:active{
  transform:scale(0.95);
}

</style>
</head>

<body>

<h1>Control de Bomba</h1>

<div class="status-row">
  <span id="mqttText">Desconectado</span>
  <div class="led" id="mqttLed"></div>
</div>

<div class="status-row">
  <span id="bombaText">Control bomba: OFF</span>
  <div class="led" id="bombaLed"></div>
</div>

<div class="container">
  <button class="on" onclick="encender()">Encender</button>
  <button class="off" onclick="apagar()">Apagar</button>
</div>

<script>

// 🔐 Configuración MQTT
const options = {
  username: "esp32",
  password: "Loquesea123",
  reconnectPeriod: 2000
};

const client = mqtt.connect("wss://4681e769df664e0daab26f3bdd7b3a70.s1.eu.hivemq.cloud:8884/mqtt", options);

const mqttText = document.getElementById("mqttText");
const mqttLed = document.getElementById("mqttLed");

const bombaText = document.getElementById("bombaText");
const bombaLed = document.getElementById("bombaLed");

client.on("connect", function () {

  mqttText.innerHTML = "Conectado a MQTT";
  mqttLed.style.background = "#00c853";

  client.subscribe("bomba/estado");

});

client.on("reconnect", function () {
  mqttText.innerHTML = "Reconectando...";
  mqttLed.style.background = "red";
});

client.on("error", function () {
  mqttText.innerHTML = "Error de conexión";
  mqttLed.style.background = "red";
});

client.on("close", function () {
  mqttText.innerHTML = "Desconectado";
  mqttLed.style.background = "red";
});

client.on("message", function(topic, message){

  if(topic === "bomba/estado"){
    const estado = message.toString();

    bombaText.innerHTML = "Control bomba: " + estado;

    if(estado === "ON"){
      bombaLed.style.background = "#00c853";
    } else {
      bombaLed.style.background = "red";
    }
  }

});

function encender(){
  client.publish("bomba/control","ON");
}

function apagar(){
  client.publish("bomba/control","OFF");
}

</script>

</body>
</html>
